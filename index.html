<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panda Shopping | Premium Curation</title>
    <style>
        /* Global Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0b0b;
            color: #ffffff;
        }

        /* Navigation Bar */
        nav {
            background-color: #000000;
            border-bottom: 2px solid #d4af37; /* Gold Border */
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 7%;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #ffffff;
            letter-spacing: 1px;
        }

        .logo span {
            color: #e50914; /* Red Accent */
        }

        nav ul {
            display: flex;
            list-style: none;
        }

        nav ul li {
            margin-left: 30px;
        }

        nav ul li a {
            color: #ffffff;
            text-decoration: none;
            font-size: 16px;
            transition: color 0.3s;
        }

        nav ul li a:hover {
            color: #d4af37; /* Gold Hover */
        }

        /* Hero Banner Section */
        .hero {
            height: 60vh;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)), url('https://images.unsplash.com/photo-1441986300917-64674bd600d8?q=80&w=1200') no-repeat center center/cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border-bottom: 1px solid #333;
            padding: 0 20px;
        }

        .hero h1 {
            font-size: 48px;
            color: #ffffff;
            margin-bottom: 10px;
        }

        .hero h1 span {
            color: #d4af37;
        }

        .hero p {
            font-size: 18px;
            color: #cccccc;
            margin-bottom: 25px;
        }

        /* Main Section & Product Grid */
        .container {
            max-width: 1200px;
            margin: 50px auto;
            padding: 0 20px;
        }

        .section-title {
            font-size: 28px;
            margin-bottom: 30px;
            border-left: 4px solid #e50914; /* Red Accent line */
            padding-left: 15px;
            color: #ffffff;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        /* Premium Product Card */
        .product-card {
            background-color: #141414;
            border: 1px solid #222;
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.3s, border-color 0.3s;
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-5px);
            border-color: #d4af37; /* Gold border on hover */
        }

        .product-image {
            width: 100%;
            height: 320px;
            background-color: #222;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
            overflow: hidden;
        }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-info {
            padding: 20px;
        }

        .product-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #ffffff;
        }

        .product-price {
            font-size: 16px;
            color: #d4af37; /* Gold Price */
            font-weight: bold;
            margin-bottom: 15px;
        }

        /* Buy Button (Red) */
        .btn-buy {
            display: block;
            width: 100%;
            background-color: #e50914; /* Red Button */
            color: white;
            text-align: center;
            padding: 12px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 4px;
            transition: background-color 0.3s;
        }

        .btn-buy:hover {
            background-color: #b20710;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">PANDA<span>SHOPPING</span></div>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Trending</a></li>
            <li><a href="#">Categories</a></li>
        </ul>
    </nav>

    <div class="hero">
        <h1>Welcome to <span>Panda Shopping</span></h1>
        <p>Curated Luxury & Premium Affiliate Finds</p>
    </div>

    <div class="container">
        <h2 class="section-title">Featured Collections</h2>
        
        <div class="product-grid">
            <div class="product-card">
                <div class="product-image">
                    <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=400" alt="Premium Sneakers">
                </div>
                <div class="product-info">
                    <div class="product-title">Premium Athletic Sneakers</div>
                    <div class="product-price">₹4,999</div>
                    <a href="#" class="btn-buy" target="_blank">BUY NOW</a>
                </div>
            </div>

            <div class="product-card">
                <div class="product-image">
                    <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?q=80&w=400" alt="Wireless Headphones">
                </div>
                <div class="product-info">
                    <div class="product-title">Luxury Wireless Headphones</div>
                    <div class="product-price">₹12,499</div>
                    <a href="#" class="btn-buy" target="_blank">BUY NOW</a>
                </div>
            </div>

            <div class="product-card">
                <div class="product-image">
                    <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?q=80&w=400" alt="Minimalist Watch">
                </div>
                <div class="product-info">
                    <div class="product-title">Classic Minimalist Watch</div>
                    <div class="product-price">₹8,999</div>
                    <a href="#" class="btn-buy" target="_blank">BUY NOW</a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
